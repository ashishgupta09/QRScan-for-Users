<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management Dashboard</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <style>
        .btn-approve { background: #4CAF50; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        .btn-reject { background: #f44336; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; margin-left: 5px; }
        .btn-approve:hover { background: #45a049; }
        .btn-reject:hover { background: #da190b; }
        .statusPill.pending { background: #ff9800; }
        .statusPill.approved { background: #4caf50; }
        .statusPill.rejected { background: #f44336; }
        .approvedBox { display: none; }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="brand">
            <span class="brand-icon">SOS</span>
            <span class="brand-name">ResQr</span>
        </div>
        <nav class="site-nav">
            <a href="./index.html">Home</a>
            <a class="nav-admin" href="./login.html">Admin</a>
            <a href="#" id="logoutBtn" style="color: #f44336; margin-left: 15px;">Logout</a>
        </nav>
    </header>

    <div class="heading">
        <span>User Management Dashboard</span>
    </div>
    <div class="approvedBox">
        <span>User Approved and QR code generated</span>
        <button type="button" aria-label="close" class="close-btn">&times;</button>
    </div>

    <div class="userTableCard">
        <table class="userTable" aria-label="User table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Blood Group</th>
                    <th>Disease</th>
                    <th>Status</th>
                    <th>QR Code</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>test user</td>
                    <td>9765975757</td>
                    <td><span class="pill bloodPill">O+</span></td>
                    <td>No</td>
                    <td><span class="pill statusPill">Approved</span></td>
                    <td><button type="button" class="qrBtn">View QR</button></td>
                    <td>-</td>
                </tr>
            </tbody>
        </table>
    </div>
    <script src="../js/admin.js"></script>
</body>

</html>
