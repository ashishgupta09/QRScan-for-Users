<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResQr: Scan. Save. Support</title>
    <!-- Use Outfit font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <section class="hero-section">
        <div class="container h-100">
            <div class="hero-content">
                <h1>ResQr: Scan. Save. Support</h1>
                <p class="subtitle">Emergency QR-based system for critical medical and personal information</p>
                <button id="registerBtn" class="btn-register">Register Now</button>
            </div>
        </div>
    </section>

    <section class="features-section">
        <div class="container">
            <div class="cards-grid">
                <!-- Card 1: Register -->
                <div class="feature-card">
                    <div class="icon-wrapper">
                        <!-- Custom Icon: Document with pencil -->
                        <div class="icon-container pencil-icon">
                            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#ff4d4d" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                                <polyline points="10 9 9 9 8 9"></polyline>
                            </svg>
                        </div>
                    </div>
                    <h3 class="card-title">Register</h3>
                    <p class="card-description">Fill in your medical and personal details securely</p>
                </div>

                <!-- Card 2: Get Approved -->
                <div class="feature-card">
                    <div class="icon-wrapper">
                        <!-- Custom Icon: Green checkbox -->
                        <div class="icon-container check-icon">
                            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#4CAF50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" fill="#e8f5e9"></rect>
                                <polyline points="9 11 12 14 22 4" stroke="#4CAF50"></polyline>
                            </svg>
                        </div>
                    </div>
                    <h3 class="card-title">Get Approved</h3>
                    <p class="card-description">Admin verifies and approves your registration</p>
                </div>

                <!-- Card 3: Scan QR -->
                <div class="feature-card">
                    <div class="icon-wrapper">
                        <!-- Custom Icon: Smartphone -->
                        <div class="icon-container phone-icon">
                            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#673AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                                <line x1="12" y1="18" x2="12.01" y2="18"></line>
                                <rect x="8" y="5" width="8" height="10" fill="#f3e5f5"></rect>
                            </svg>
                        </div>
                    </div>
                    <h3 class="card-title">Scan QR</h3>
                    <p class="card-description">Emergency responders can access your info instantly</p>
                </div>
            </div>
        </div>
    </section>

    <script src="js/script.js"></script>
</body>
</html>
